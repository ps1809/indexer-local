spring.application.name=indexer-local

# ==================== Active Profile ====================
# Default profile: local. Override with SPRING_PROFILES_ACTIVE env var or CLI arg.
spring.profiles.active=local

# ==================== Server Configuration ====================
server.port=8080
server.servlet.context-path=/

# ==================== SQLite DataSource Configuration ====================
spring.datasource.url=jdbc:sqlite:./indexer-local.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local.db

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ==================== Actuator Configuration ====================
# Exposure for development (safe endpoints)
management.endpoints.web.exposure.include=health,info,env

# Security configuration for actuator endpoints (development)
management.server.port=9090
management.server.address=127.0.0.1

# Health endpoint settings
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Enable specific endpoints
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.env.enabled=true

# ==================== Info Endpoint ====================
info.app.name=${spring.application.name}
info.app.description=Local Indexer for Spring Boot Projects
info.app.version=0.0.1-SNAPSHOT
info.app.java-version=${java.version}

# ==================== SpringDoc OpenAPI (Swagger) Configuration ====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.projectiq.indexerlocal=INFO
logging.level.org.springframework=WARN
logging.level.org.sqlite=WARN

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration (uncomment to enable file logging)
# logging.file.name=logs/indexer-local.log
# logging.file.max-size=10MB
# logging.file.max-history=30

# ==================== Indexer Workspace Configuration ====================
indexer.workspace.root-dir=./workspace
indexer.workspace.auto-create=true
indexer.workspace.verify-writable=true
