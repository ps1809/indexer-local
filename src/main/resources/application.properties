spring.application.name=indexer-local

# SQLite DataSource Configuration
spring.datasource.url=jdbc:sqlite:./indexer-local.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local.db

# JPA/Hibernate not needed for JDBC but disable auto-config issues
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Disable Spring Boot web server if not needed (can remove if using REST)
server.port=8080