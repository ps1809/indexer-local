# ==================== Local Profile Configuration ====================
# Activated by: spring.profiles.active=local (default)

# Server
server.port=8080
server.servlet.context-path=/

# DataSource - local development database
spring.datasource.url=jdbc:sqlite:./indexer-local.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local.db

# Logging - verbose for local debugging
logging.level.root=DEBUG
logging.level.com.projectiq.indexerlocal=DEBUG
logging.level.org.springframework=WARN
logging.level.org.sqlite=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - development friendly
management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health,info,env
management.endpoint.health.show-details=always
management.endpoint.env.enabled=true

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs