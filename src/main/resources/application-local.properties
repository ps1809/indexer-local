# ==================== Local Profile Configuration ====================
# Activated by: spring.profiles.active=local (default)

# Server
server.port=8080

# DataSource - in-memory for local development
spring.datasource.url=jdbc:sqlite:./indexer-local-local.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local-local.db

# Logging - verbose for debugging
logging.level.root=DEBUG
logging.level.com.projectiq.indexerlocal=DEBUG
logging.level.org.springframework=WARN
logging.level.org.sqlite=DEBUG

# Actuator - expose all endpoints for local development
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true