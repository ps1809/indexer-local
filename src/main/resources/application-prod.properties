# ==================== Prod Profile Configuration ====================
# Activated by: spring.profiles.active=prod

# Server
server.port=8080
server.servlet.context-path=/

# DataSource - production database (configure securely)
spring.datasource.url=${DB_URL:jdbc:sqlite:./indexer-local-prod.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local-prod.db

# Logging - minimal output for production
logging.level.root=WARN
logging.level.com.projectiq.indexerlocal=INFO
logging.level.org.springframework=WARN
logging.level.org.sqlite=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - minimal exposure for security
management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Swagger UI disabled in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false