# ==================== Prod Profile Configuration ====================
# Activated by: spring.profiles.active=prod

# Server
server.port=8080
server.servlet.context-path=/

# DataSource - production database path
spring.datasource.url=jdbc:sqlite:${INDEXER_DB_PATH:./indexer-local-prod.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:${INDEXER_DB_PATH:./indexer-local-prod.db}

# Logging - production grade (info level, suppress debug noise)
logging.level.root=WARN
logging.level.com.projectiq.indexerlocal=INFO
logging.level.org.springframework=ERROR
logging.level.org.sqlite=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - expose minimal endpoints in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.env.enabled=false
management.endpoint.metrics.enabled=false

# Swagger UI - disabled in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false