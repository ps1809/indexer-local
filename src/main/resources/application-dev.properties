# ==================== Dev Profile Configuration ====================
# Activated by: spring.profiles.active=dev

# Server
server.port=8081
server.servlet.context-path=/indexer-local

# DataSource - shared database for dev team
spring.datasource.url=jdbc:sqlite:./indexer-local-dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.data-source-uri=jdbc:sqlite:./indexer-local-dev.db

# Logging - standard debug level
logging.level.root=INFO
logging.level.com.projectiq.indexerlocal=DEBUG
logging.level.org.springframework=WARN
logging.level.org.sqlite=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - expose standard endpoints
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=when_authorized

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/indexer-local/swagger-ui.html
springdoc.api-docs.path=/indexer-local/api-docs